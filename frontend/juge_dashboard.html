<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Juge</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding: 20px; background-color: #f4f6f9; }
    h1 { margin-bottom: 20px; }
    table { background-color: #fff; }
  </style>
</head>
<body>

  <h1>Tableau de bord - Juge</h1>
  <button class="btn btn-secondary mb-3" onclick="retourAccueil()">Retour à l'accueil</button>
  <button class="btn btn-primary mb-3" onclick="ajouterDossier()">Ajouter un dossier</button>

  <table class="table table-bordered">
    <thead>
      <tr>
        <th>ID Dossier</th>
        <th>Nom détenu</th>
        <th>Décision</th>
        <th>Mandat</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="dossiers">
      <tr>
        <td>1</td>
        <td>Jean Kouadio</td>
        <td>En cours</td>
        <td>Mandat N°123</td>
        <td>
          <button class="btn btn-sm btn-success" onclick="valider(this)">Valider</button>
          <button class="btn btn-sm btn-primary" onclick="modifier(this)">Modifier</button>
          <button class="btn btn-sm btn-danger" onclick="supprimer(this)">Supprimer</button>
        </td>
      </tr>
    </tbody>
  </table>

  <script>
    function retourAccueil() {
      window.location.href = "index.html";
    }

    // Ajouter un nouveau dossier
    function ajouterDossier() {
      let tbody = document.getElementById('dossiers');
      let row = tbody.insertRow();
      row.innerHTML = `<td>Nouvel ID</td>
                      <td contenteditable="true">Nom détenu</td>
                      <td contenteditable="true">Décision</td>
                      <td contenteditable="true">Mandat</td>
                      <td>
                        <button class="btn btn-sm btn-success" onclick="valider(this)">Valider</button>
                        <button class="btn btn-sm btn-primary" onclick="modifier(this)">Modifier</button>
                        <button class="btn btn-sm btn-danger" onclick="supprimer(this)">Supprimer</button>
                      </td>`;
    }

    // Valider la décision
    function valider(btn) {
      let row = btn.parentNode.parentNode;
      row.cells[2].innerText = "Validée";
      alert("Décision validée !");
    }

    // Modifier un dossier
    function modifier(btn) {
      alert("Clique sur les cellules pour modifier directement les informations.");
    }

    // Supprimer un dossier
    function supprimer(btn) {
      if(confirm("Voulez-vous vraiment supprimer ce dossier ?")) {
        let row = btn.parentNode.parentNode;
        row.parentNode.removeChild(row);
      }
    }
  </script>

</body>
</html>
