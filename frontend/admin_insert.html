<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

    <h1>Dashboard Admin</h1>
    <button class="btn btn-success mb-3" onclick="afficherFormulaire()">Ajouter Utilisateur</button>

    <!-- Formulaire caché -->
    <div id="formulaire" style="display:none;" class="mb-3">
    <input type="text" id="nom" placeholder="Nom" class="form-control mb-2">
    <input type="email" id="email" placeholder="Email" class="form-control mb-2">
    <input type="password" id="password" placeholder="Mot de passe" class="form-control mb-2">
    <select id="role" class="form-control mb-2">
        <option value="1">ADMINISTRATEUR</option>
        <option value="2">GREFFIER</option>
        <option value="3">JUGE</option>
        <option value="4">AGENT PENITENTIAIRE</option>
    </select>
    <button class="btn btn-primary" onclick="ajouterUtilisateur()">Valider</button>
    </div>

    <table class="table table-bordered">
    <thead>
        <tr>
        <th>ID</th>
        <th>Nom</th>
        <th>Email</th>
        <th>Rôle</th>
        </tr>
    </thead>
    <tbody id="utilisateurs">
        <!-- Liste des utilisateurs -->
    </tbody>
    </table>

    <script>
        // Afficher / cacher formulaire
        function afficherFormulaire() {
        const form = document.getElementById('formulaire');
        form.style.display = form.style.display === 'none' ? 'block' : 'none';
        }

        // Charger tous les utilisateurs
        function chargerUtilisateurs() {
        fetch('http://localhost:3000/api/users')
            .then(res => res.json())
            .then(data => {
            const tbody = document.getElementById('utilisateurs');
            tbody.innerHTML = '';
            data.forEach(u => {
                tbody.innerHTML += `
                <tr>
                    <td>${u.id}</td>
                    <td>${u.nom}</td>
                    <td>${u.email}</td>
                    <td>${u.nom_role}</td>
                </tr>
                `;
            });
            });
        }

        // Ajouter utilisateur via API
        function ajouterUtilisateur() {
        const nom = document.getElementById('nom').value;
        const email = document.getElementById('email').value;
        const password_hash = document.getElementById('password').value; // pour test, en vrai bcrypt
        const role_id = document.getElementById('role').value;

        fetch('http://localhost:3000/api/users', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nom, email, password_hash, role_id })
        })
        .then(res => res.json())
        .then(data => {
            alert(data.message);
            chargerUtilisateurs();  // actualiser le tableau
            document.getElementById('formulaire').style.display = 'none';
        });
        }

        // Au chargement de la page
        window.onload = chargerUtilisateurs;
    </script>

</body>
</html>
