<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion Agent Pénitentiaire</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f4f6f9;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .card {
      padding: 30px;
      border-radius: 12px;
      width: 400px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      background-color: #dc3545;
    }
    h2 { text-align: center; margin-bottom: 30px; color: #fff; }
    .btn-light { background-color: #fff; color: #dc3545; }
  </style>
</head>
<body>

  <div class="card">
    <h2>Connexion Agent pénitentiaire</h2>
    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label text-white">Nom utilisateur</label>
        <input type="text" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label text-white">Mot de passe</label>
        <input type="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-light w-100">Se connecter</button>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e){
      e.preventDefault();

      // Récupération des valeurs (optionnel pour la maquette)
      const username = e.target[0].value;
      const password = e.target[1].value;

      // Simulation de connexion réussie
      alert("Connexion Agent réussie !");

      // Redirection vers le dashboard de l'Agent
      window.location.href = "agent_dashboard.html";
    });
  </script>

</body>
</html>
