<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Agent Pénitentiaire</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding: 20px; background-color: #f4f6f9; }
    h1 { margin-bottom: 20px; }
    table { background-color: #fff; }
  </style>
</head>
<body>

  <h1>Tableau de bord - Agent Pénitentiaire</h1>
  <button class="btn btn-secondary mb-3" onclick="retourAccueil()">Retour à l'accueil</button>
  <button class="btn btn-success mb-3" onclick="ajouterDetenu()">Ajouter un détenu</button>

  <table class="table table-bordered">
    <thead>
      <tr>
        <th>ID</th>
        <th>Nom</th>
        <th>Cellule</th>
        <th>Statut</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="detenus">
      <tr>
        <td>1</td>
        <td>Jean Kouadio</td>
        <td>A1</td>
        <td>Actif</td>
        <td>
          <button class="btn btn-sm btn-primary" onclick="modifier(this)">Modifier</button>
          <button class="btn btn-sm btn-danger" onclick="supprimer(this)">Supprimer</button>
        </td>
      </tr>
    </tbody>
  </table>

  <script>
    function retourAccueil() {
      window.location.href = "index.html";
    }

    function ajouterDetenu() {
      let tbody = document.getElementById('detenus');
      let row = tbody.insertRow();
      row.innerHTML = `<td>Nouvel ID</td>
                      <td contenteditable="true">Nom</td>
                      <td contenteditable="true">Cellule</td>
                      <td contenteditable="true">Statut</td>
                      <td>
                        <button class="btn btn-sm btn-primary" onclick="modifier(this)">Modifier</button>
                        <button class="btn btn-sm btn-danger" onclick="supprimer(this)">Supprimer</button>
                      </td>`;
    }

    function modifier(btn) {
      alert("Clique sur la cellule pour modifier les informations directement.");
    }

    function supprimer(btn) {
      if(confirm("Voulez-vous vraiment supprimer ce détenu ?")) {
        let row = btn.parentNode.parentNode;
        row.parentNode.removeChild(row);
      }
    }
  </script>

</body>
</html>
