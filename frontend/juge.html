<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion Juge</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f4f6f9;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .card {
      padding: 30px;
      border-radius: 12px;
      width: 400px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    h2 { text-align: center; margin-bottom: 30px; color: #1e2a38; }
  </style>
</head>
<body>

  <div class="card">
    <h2>Connexion Juge</h2>
    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label">Nom utilisateur</label>
        <input type="text" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Mot de passe</label>
        <input type="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-warning w-100">Se connecter</button>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e){
      e.preventDefault();
      // Simulation login OK
      alert("Connexion Juge réussie !");
      // Redirection vers le dashboard du Juge
      window.location.href = "juge_dashboard.html";
    });
  </script>

</body>
</html>
