<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Greffier</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding: 20px; background-color: #f4f6f9; }
    h1 { margin-bottom: 20px; }
    table { background-color: #fff; }
  </style>
</head>
<body>

  <h1>Tableau de bord - Administrateur</h1>
  <button class="btn btn-secondary mb-3" onclick="retourAccueil()">Retour à l'accueil</button>
  <button class="btn btn-success mb-3" id="ajouterDossier" onclick="ajouterDossier()">Ajouter un dossier</button>

  <table class="table table-bordered">
    <thead>
      <tr>
        <th>ID Dossier</th>
        <th>Nom détenu</th>
        <th>Type de dossier</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="dossiers">
      <tr>
        <td>1</td>
        <td>Jean Kouadio</td>
        <td>Vol</td>
        <td>
          <button class="btn btn-sm btn-primary" onclick="modifier(this)">Modifier</button>
          <button class="btn btn-sm btn-danger" onclick="supprimer(this)">Supprimer</button>
        </td>
      </tr>
    </tbody>
  </table>

  <script>
    function retourAccueil() {
      window.location.href = "index.html";
    }

    // function ajouterDossier() {
    //   let tbody = document.getElementById('dossiers');
    //   let row = tbody.insertRow();
    //   row.innerHTML = `<td>Nouvel ID</td>
    //                   <td contenteditable="true">Nom</td>
    //                   <td contenteditable="true">Type</td>
    //                   <td>
    //                     <button class="btn btn-sm btn-primary" onclick="modifier(this)">Modifier</button>
    //                     <button class="btn btn-sm btn-danger" onclick="supprimer(this)">Supprimer</button>
    //                   </td>`;
    // }
    
    function ajouterDossier() {
      // windows.location.href = "admin_insert.html";

      document.getElementById('ajouterDossier').addEventListener('click', function(e){
      e.preventDefault();
      // Simulation login OK
      alert("Déplacement vers l'insertion des données !");
      // Redirection vers le dashboard du Greffier
      window.location.href = "admin_insert.html";
    });
    }

    function modifier(btn) {
      alert("Clique sur la cellule pour modifier les informations directement.");
    }

    function supprimer(btn) {
      if(confirm("Voulez-vous vraiment supprimer ce dossier ?")) {
        let row = btn.parentNode.parentNode;
        row.parentNode.removeChild(row);
      }
    }
  </script>

</body>
</html>
