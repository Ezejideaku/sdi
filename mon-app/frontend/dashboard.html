<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Dashboard</h1>
        <div>
            <span id="user-name"></span>
            <span id="user-category" class="badge"></span>
            <button onclick="logout()">Déconnexion</button>
        </div>
    </header>
    <main>
        <section id="section-create-user" class="hidden card">
            <h2>Créer un utilisateur</h2>
            <p>Formulaire de création d'utilisateur...</p>
        </section>
        <section id="section-categories" class="hidden card">
            <h2>Gérer les catégories</h2>
            <p>Liste et gestion des catégories...</p>
        </section>
        <section id="section-reports" class="hidden card">
            <h2>Rapports</h2>
            <p>Statistiques et rapports...</p>
        </section>
        <section class="card">
            <h2>Vue générale</h2>
            <p>Bienvenue sur votre tableau de bord.</p>
        </section>
    </main>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
